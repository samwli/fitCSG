name: fitcsg
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - scipy
  - matplotlib
  - python-graphviz
  - pip
  - pip:
      # Install the build of PyTorch that matches your CUDA / CPU setup.
      # CPU-only example:
      #   pip install torch --index-url https://download.pytorch.org/whl/cpu
      - torch
      - opencv-python
      - pillow
